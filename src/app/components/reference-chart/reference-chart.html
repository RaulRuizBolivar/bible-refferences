<section class="chart-section">
  <h2 class="chart-title">AT → NT · Referencias cruzadas</h2>

  <div class="legend">
    <span class="legend-dot tipología"></span><span class="legend-label">Tipología</span>
    <span class="legend-dot cita-directa"></span><span class="legend-label">Cita directa</span>
    <span class="legend-dot paralelo-tematico"></span><span class="legend-label">Paralelo temático</span>
    <span class="legend-dot alusión"></span><span class="legend-label">Alusión</span>
  </div>

  <div class="svg-wrapper">
    <svg
      [attr.viewBox]="'0 0 ' + data.svgWidth + ' ' + data.svgHeight"
      preserveAspectRatio="xMidYMid meet"
      aria-label="Gráfico de referencias cruzadas bíblicas"
    >
      <!-- Column headers -->
      <text [attr.x]="data.otHeaderX" y="30" text-anchor="middle" class="col-header">Antiguo Testamento</text>
      <text [attr.x]="data.ntHeaderX" y="30" text-anchor="middle" class="col-header">Nuevo Testamento</text>

      <!-- Bands -->
      @for (link of data.links; track link.id) {
        <path
          [attr.d]="link.path"
          [attr.fill]="link.color"
          class="band"
          role="button"
          tabindex="0"
          [attr.aria-label]="link.title"
          (click)="abrirReferencia(link.reference)"
          (keydown.enter)="abrirReferencia(link.reference)"
        >
          <title>{{ link.title }}</title>
        </path>
      }

      <!-- OT bars -->
      @for (node of data.otNodes; track node.book) {
        <rect
          [attr.x]="OT_X" [attr.y]="node.y"
          [attr.width]="OT_W" [attr.height]="node.h"
          class="bar bar-ot" rx="3"
        />
        <text
          [attr.x]="OT_X - 8"
          [attr.y]="node.y + node.h / 2"
          text-anchor="end" dominant-baseline="middle"
          class="bar-label"
        >{{ node.book }}</text>
      }

      <!-- NT bars -->
      @for (node of data.ntNodes; track node.book) {
        <rect
          [attr.x]="NT_X" [attr.y]="node.y"
          [attr.width]="NT_W" [attr.height]="node.h"
          class="bar bar-nt" rx="3"
        />
        <text
          [attr.x]="NT_X + NT_W + 8"
          [attr.y]="node.y + node.h / 2"
          text-anchor="start" dominant-baseline="middle"
          class="bar-label"
        >{{ node.book }}</text>
      }
    </svg>
  </div>
</section>
