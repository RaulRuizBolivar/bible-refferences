<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button type="button" class="nav-toggle" (click)="toggleNav()" [attr.aria-label]="isNavCollapsed ? 'Expandir navegación' : 'Colapsar navegación'">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-icon class="toolbar-icon">menu_book</mat-icon>
  <span class="toolbar-title">Biblia Católica — Referencias</span>
  <span class="toolbar-spacer"></span>
  <button mat-icon-button type="button" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Activar modo claro' : 'Activar modo oscuro'" [matTooltip]="isDarkMode ? 'Modo claro' : 'Modo oscuro'" matTooltipPosition="below">
    <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<div class="app-shell" [class.nav-collapsed]="isNavCollapsed">
  <nav class="app-nav">
    <a
      mat-button
      routerLink="/"
      routerLinkActive="nav-active"
      [routerLinkActiveOptions]="{ exact: true }"
      matTooltip="Profecías"
      matTooltipPosition="right"
      [matTooltipDisabled]="!isNavCollapsed"
    >
      <mat-icon>auto_awesome</mat-icon>
      <span class="nav-label">Profecías</span>
    </a>
    <a mat-button routerLink="/references" routerLinkActive="nav-active" matTooltip="Referencias cruzadas" matTooltipPosition="right" [matTooltipDisabled]="!isNavCollapsed">
      <mat-icon>swap_horiz</mat-icon>
      <span class="nav-label">Referencias cruzadas</span>
    </a>
    <a mat-button routerLink="/covenants" routerLinkActive="nav-active" matTooltip="Alianzas" matTooltipPosition="right" [matTooltipDisabled]="!isNavCollapsed">
      <mat-icon>handshake</mat-icon>
      <span class="nav-label">Alianzas</span>
    </a>
    <a mat-button routerLink="/network" routerLinkActive="nav-active" matTooltip="Personajes" matTooltipPosition="right" [matTooltipDisabled]="!isNavCollapsed">
      <mat-icon>hub</mat-icon>
      <span class="nav-label">Personajes</span>
    </a>
    <a mat-button routerLink="/charts" routerLinkActive="nav-active" matTooltip="Gráfico" matTooltipPosition="right" [matTooltipDisabled]="!isNavCollapsed">
      <mat-icon>account_tree</mat-icon>
      <span class="nav-label">Gráfico</span>
    </a>
  </nav>

  <main class="app-content">
    <router-outlet />
  </main>
</div>
